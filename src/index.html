<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TripWip — Proposals</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #e8eaee;
      --text: #111318;
      --muted: #7a8394;
      --green: #0d7a5f;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .logo span { color: var(--green); }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .proposals {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .proposal-link {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }
    .proposal-link:hover {
      border-color: var(--green);
      box-shadow: 0 2px 12px rgba(13,122,95,0.08);
    }
    .proposal-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .proposal-desc {
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Trip<span>Wip</span></div>
    <h1>Propuestas</h1>
    <div class="proposals">
      <a href="proposals/marketing-head.html" class="proposal-link">
        <div class="proposal-title">Head of Paid Media</div>
        <div class="proposal-desc">Propuesta laboral — Marzo 2026</div>
      </a>
    </div>
  </div>
</body>
</html>
